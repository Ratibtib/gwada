<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Outfit',sans-serif;background:#0A1628;color:#F0EAD6;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:rgba(255,255,255,.04)}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.fu{animation:fu .4s ease forwards}
.card{transition:all .25s;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;cursor:pointer}
.card:active{transform:scale(.985)}
.card.voted{background:rgba(232,80,80,.06);border-color:rgba(232,80,80,.2)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .2s;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);user-select:none;white-space:nowrap}
.chip:active{transform:scale(.95)}.chip.on{background:rgba(45,106,79,.4);border-color:#2D6A4F;color:#A1C181}
.tab{padding:10px 16px;border-radius:12px;border:none;background:rgba(255,255,255,.06);color:#F0EAD6;cursor:pointer;font-size:13px;font-weight:500;font-family:'Outfit',sans-serif;transition:all .2s;white-space:nowrap}
.tab:active{transform:scale(.95)}.tab.on{background:linear-gradient(135deg,#2D6A4F,#0077B6);color:#fff}
.pbtn{padding:7px 13px;border-radius:10px;border:2px solid transparent;background:rgba(255,255,255,.06);cursor:pointer;font-size:13px;font-family:'Outfit',sans-serif;color:#F0EAD6;transition:all .2s;display:flex;align-items:center;gap:5px}
.pbtn:active{transform:scale(.95)}
.votebtn{border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0;transition:all .2s;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06)}
.votebtn:active{transform:scale(.85)}
.votebtn.on{background:rgba(232,80,80,.2);border-color:#E85050}
.ic{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;cursor:pointer;transition:all .3s}
.ic:active{background:rgba(255,255,255,.07)}
input[type=text]{width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#F0EAD6;font-size:14px;font-family:'Outfit',sans-serif;outline:none}
input[type=text]:focus{border-color:rgba(255,255,255,.2)}
input[type=text]::placeholder{color:rgba(240,234,214,.3)}
.av{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.av.ghost{background:rgba(255,255,255,.03);border:1.5px dashed rgba(255,255,255,.1);opacity:.3}
.bar-track{width:70px;height:5px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
</style>

// ── API helpers ──────────────────────────────────────────
const api={
  async getVotes(){try{const r=await fetch("/api/votes");return await r.json()}catch{return{}}},
  async toggleVote(pid,aid){try{const r=await fetch("/api/votes",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({personId:pid,activityId:aid})});return await r.json()}catch{return null}},
  async reset(){try{await fetch("/api/votes",{method:"DELETE"});return{}}catch{return{}}},
};

const lc=l=>l==="facile"?"#2D6A4F":l==="modéré"?"#E88D67":"#BB4430";

// ── MAIN APP ─────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("catalogue");
  const[votes,setVotes]=useState({});
  const[loaded,setLoaded]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const[filters,setFilters]=useState({themes:[],zone:"all",level:"all",search:""});
  const[me,setMe]=useState(null);
  const[expanded,setExpanded]=useState(null);
  const[openInfo,setOpenInfo]=useState(null);

  useEffect(()=>{api.getVotes().then(v=>{setVotes(v);setLoaded(true)});},[]);
  useEffect(()=>{if(!loaded)return;const iv=setInterval(async()=>{const f=await api.getVotes();setVotes(f);},5000);return()=>clearInterval(iv);},[loaded]);

  const toggle=async(pid,aid)=>{
    setSyncing(true);
    const fresh=await api.toggleVote(pid,aid);
    if(fresh)setVotes(fresh);
    setSyncing(false);
  };
  const refresh=async()=>{setSyncing(true);const f=await api.getVotes();setVotes(f);setSyncing(false);};
  const resetAll=async()=>{if(confirm("⚠️ Effacer TOUS les votes du groupe ?")){const f=await api.reset();setVotes(f);}};

  const voters=aid=>PEOPLE.filter(p=>votes[`${p.id}-${aid}`]);
  const filtered=useMemo(()=>A.filter(a=>{
    if(filters.zone!=="all"&&a.zone!==filters.zone)return false;
    if(filters.level!=="all"&&a.level!==filters.level)return false;
    if(filters.themes.length>0&&!filters.themes.some(t=>a.themes.includes(t)))return false;
    if(filters.search){const s=filters.search.toLowerCase();if(!a.name.toLowerCase().includes(s)&&!a.desc.toLowerCase().includes(s))return false;}
    return true;
  }),[filters]);
  const topActs=useMemo(()=>{
    const r=[];A.forEach(a=>{const v=voters(a.id);if(v.length)r.push({a,v});});
    return r.sort((a,b)=>b.v.length-a.v.length);
  },[votes]);

  const INFO=[
    {id:"budget",t:"💰 Budget",c:"~100-150€/jour groupe (hors hébergement). Courses Super U ~150-200€/sem. Essence ~1,60€/L. Restos 15-35€/plat. Ferry A/R ~20-30€/adulte."},
    {id:"meteo",t:"🌤️ Météo",c:"26-32°C stable. Saison sèche (Carême) déc-mai. Averses courtes l'après-midi. K-way léger + crème solaire 50 toujours."},
    {id:"securite",t:"🛡️ Sécurité",c:"Guadeloupe sûre. Rien en vue dans voitures. Attention manchinilliers (peinture rouge). Routes sinueuses Basse-Terre."},
    {id:"bebe",t:"👶 Bébé (1 an)",c:"Porte-bébé indispensable. Couches/lait en supermarché. Moustiquaire + anti-moustiques. Eau en bouteille. Climatiser voiture."},
    {id:"seniors",t:"👵 Seniors",c:"Chapeau, hydratation++. Activités le matin. Pharmacies Deshaies/Gosier. CHU à Pointe-à-Pitre. Éviter Soufrière si pb cardio."},
    {id:"ferry",t:"⛴️ Ferries",c:"L'Express des Îles, Val'Ferry, CTM Deher. Réserver en ligne. Arriver 30 min avant. Cocculine anti-mal de mer."},
    {id:"voitures",t:"🚗 2 Voitures",c:"Waze indispensable. Stations ferment tôt dimanche. Parking gratuit quasi partout. Klaxonner dans les virages ! (c'est local)"},
    {id:"split",t:"👥 Split équipes",c:"2 voitures = liberté. Équipe Aventure (Soufrière, plongée) + Équipe Relax (plage, jardin). Se retrouver pour le dîner !"},
    {id:"valise",t:"🧳 Valise",c:"Maillots x3, solaire 50, anti-moustiques, chaussures eau + rando, k-way, masque/tuba, chapeau, sac étanche tel, pharmacie (Doliprane, Cocculine, Biafine)."},
  ];

  if(!loaded)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48,animation:"fl 2s ease-in-out infinite"}}>🌴</div>
      <div style={{fontSize:16,opacity:.6}}>Chargement…</div>
    </div>
  );

  return(
    <div>
      {/* HERO */}
      <div style={{position:"relative",padding:"46px 20px 22px",textAlign:"center",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(45,106,79,.15),rgba(0,119,182,.1) 50%,transparent)"}}/>
        <div style={{position:"absolute",top:18,left:"8%",fontSize:38,animation:"fl 4s ease-in-out infinite"}}>🌴</div>
        <div style={{position:"absolute",top:36,right:"10%",fontSize:30,animation:"fl 5s ease-in-out infinite 1s"}}>🐠</div>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{fontSize:11,letterSpacing:4,textTransform:"uppercase",color:"#A1C181",marginBottom:6,fontWeight:600}}>Guide partagé — 2 semaines</div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(30px,7vw,50px)",fontWeight:700,background:"linear-gradient(135deg,#F0EAD6,#F2C57C,#E88D67)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Guadeloupe 🇬🇵</h1>
          <p style={{marginTop:6,fontSize:13,color:"rgba(240,234,214,.5)",maxWidth:440,marginInline:"auto"}}>9 voyageurs • 2 voitures • {A.length} activités</p>
          <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:12,flexWrap:"wrap"}}>
            {PEOPLE.map(p=>{const c=A.filter(a=>votes[`${p.id}-${a.id}`]).length;return(
              <span key={p.id} style={{fontSize:11,background:`${p.color}22`,color:p.color,padding:"3px 8px",borderRadius:7,border:`1px solid ${p.color}44`}}>{p.emoji} {p.name}{c?` (${c})`:""}</span>
            );})}
            {KIDS.map(k=><span key={k.id} style={{fontSize:11,background:"rgba(255,255,255,.05)",color:"rgba(240,234,214,.4)",padding:"3px 8px",borderRadius:7}}>{k.emoji} {k.name} ({k.age})</span>)}
          </div>
          <div style={{marginTop:8,display:"flex",justifyContent:"center",gap:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:syncing?"#F2C57C":"#A1C181",display:"flex",alignItems:"center",gap:4}}>
              {syncing?<span style={{display:"inline-block",animation:"sp 1s linear infinite"}}>⟳</span>:"☁️"}
              {syncing?" Sync...":" Partagé en ligne"}
            </span>
            <button onClick={refresh} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#F0EAD6",padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"Outfit"}}>🔄</button>
          </div>
        </div>
      </div>

      {/* TABS */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(10,22,40,.96)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,.06)",padding:"9px 14px",display:"flex",gap:7,overflowX:"auto"}}>
        {[{id:"catalogue",l:`📋 Catalogue (${A.length})`},{id:"groupe",l:`👥 Groupe${topActs.length?` (${topActs.length})`:""}`},{id:"iles",l:"⛴️ Îles"},{id:"infos",l:"ℹ️ Infos"}].map(t=>
          <button key={t.id} className={`tab ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>
        )}
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:14}}>

      {/* CATALOGUE */}
      {tab==="catalogue"&&<div className="fu">
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,color:"rgba(240,234,214,.5)",marginBottom:7}}>👤 Qui es-tu ?</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",padding:7,background:"rgba(255,255,255,.04)",borderRadius:14}}>
            {PEOPLE.map(p=>{const c=A.filter(a=>votes[`${p.id}-${a.id}`]).length;return(
              <button key={p.id} className="pbtn" onClick={()=>setMe(me===p.id?null:p.id)}
                style={me===p.id?{background:`${p.color}33`,borderColor:p.color,color:p.color}:{}}>
                {p.emoji} {p.name}{c?` (${c})`:""}
              </button>);})}
          </div>
          {me?<div style={{marginTop:7,fontSize:13,color:PEOPLE.find(p=>p.id===me)?.color}}>✨ Touche ❤️ — visible par tout le groupe !</div>
            :<div style={{marginTop:7,fontSize:13,color:"rgba(240,234,214,.3)",fontStyle:"italic"}}>☝️ Choisis ton nom pour voter</div>}
        </div>

        <input type="text" placeholder="🔍 Rechercher…" value={filters.search} onChange={e=>setFilters(f=>({...f,search:e.target.value}))} style={{marginBottom:10}}/>

        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          <span className={`chip ${filters.zone==="all"?"on":""}`} onClick={()=>setFilters(f=>({...f,zone:"all"}))}>🗺️ Toutes</span>
          {ZONES.map(z=><span key={z.id} className={`chip ${filters.zone===z.id?"on":""}`} onClick={()=>setFilters(f=>({...f,zone:z.id}))}
            style={filters.zone===z.id?{borderColor:z.color,color:z.color,background:`${z.color}22`}:{}}>{z.label}</span>)}
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          <span className={`chip ${filters.level==="all"?"on":""}`} onClick={()=>setFilters(f=>({...f,level:"all"}))}>Tous niveaux</span>
          {["facile","modéré","sportif"].map(l=><span key={l} className={`chip ${filters.level===l?"on":""}`} onClick={()=>setFilters(f=>({...f,level:l}))}
            style={filters.level===l?{borderColor:lc(l),color:lc(l),background:`${lc(l)}22`}:{}}>{l==="facile"?"🟢":l==="modéré"?"🟠":"🔴"} {l[0].toUpperCase()+l.slice(1)}</span>)}
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
          {THEMES.map(t=><span key={t.id} className={`chip ${filters.themes.includes(t.id)?"on":""}`}
            onClick={()=>setFilters(f=>({...f,themes:f.themes.includes(t.id)?f.themes.filter(x=>x!==t.id):[...f.themes,t.id]}))}>{t.icon} {t.label}</span>)}
        </div>

        <div style={{fontSize:12,color:"rgba(240,234,214,.35)",marginBottom:10}}>{filtered.length} activité{filtered.length!==1?"s":""}</div>

        <div style={{display:"grid",gap:10}}>
          {filtered.map(a=>{
            const v=voters(a.id);const exp=expanded===a.id;const zo=ZONES.find(z=>z.id===a.zone);
            const voted=me&&votes[`${me}-${a.id}`];
            return<div key={a.id} className={`card${voted?" voted":""}`} onClick={()=>setExpanded(exp?null:a.id)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
                    <h3 style={{fontSize:15,fontWeight:600}}>{a.name}</h3>
                    <span style={{fontSize:10,padding:"2px 7px",borderRadius:7,background:`${lc(a.level)}22`,color:lc(a.level),fontWeight:500}}>{a.level}</span>
                    <span style={{fontSize:10,padding:"2px 7px",borderRadius:7,background:`${zo?.color}22`,color:zo?.color}}>{a.zone==="s1"?"Sem.1":a.zone==="s2"?"Sem.2":"Île"}</span>
                  </div>
                  <p style={{fontSize:12.5,color:"rgba(240,234,214,.6)",lineHeight:1.45}}>{a.desc}</p>
                </div>
                {me&&<button className={`votebtn${voted?" on":""}`} onClick={e=>{e.stopPropagation();toggle(me,a.id);}}>{voted?"❤️":"🤍"}</button>}
              </div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>
                {a.themes.slice(0,4).map(t=>{const th=THEMES.find(x=>x.id===t);return<span key={t} style={{fontSize:10,padding:"2px 5px",borderRadius:5,background:"rgba(255,255,255,.04)",color:"rgba(240,234,214,.45)"}}>{th?.icon} {th?.label}</span>;})}
              </div>
              {v.length>0&&<div style={{marginTop:6,display:"flex",alignItems:"center",gap:3,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:"rgba(240,234,214,.35)",marginRight:2}}>Intéressés :</span>
                {v.map(p=><span key={p.id} className="av" title={p.name} style={{background:`${p.color}33`,border:`2px solid ${p.color}`}}>{p.emoji}</span>)}
                {v.length>=4&&<span style={{fontSize:11,color:"#F2C57C",marginLeft:3,fontWeight:600}}>🔥</span>}
                {v.length===6&&<span style={{fontSize:10,color:"#E85050",fontWeight:600}}>UNANIME !</span>}
              </div>}
              {exp&&<div style={{marginTop:10,padding:10,background:"rgba(255,255,255,.03)",borderRadius:10,borderTop:"1px solid rgba(255,255,255,.06)"}} onClick={e=>e.stopPropagation()}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,fontSize:12.5}}>
                  <div><span style={{color:"rgba(240,234,214,.4)"}}>⏱</span> {a.duration}</div>
                  <div><span style={{color:"rgba(240,234,214,.4)"}}>💰</span> {a.cost}</div>
                </div>
                <div style={{marginTop:6,fontSize:12.5,color:"rgba(240,234,214,.65)",lineHeight:1.5}}><span style={{color:"#F2C57C"}}>Adaptation :</span> {a.adapt}</div>
              </div>}
            </div>;})}
        </div>
      </div>}

      {/* GROUPE */}
      {tab==="groupe"&&<div className="fu">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:10}}>
          <div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26}}>Vue Groupe</h2>
            <p style={{fontSize:13,color:"rgba(240,234,214,.5)",marginTop:3}}>Qui veut faire quoi ?</p>
          </div>
          <button onClick={resetAll} style={{background:"rgba(232,80,80,.1)",border:"1px solid rgba(232,80,80,.2)",borderRadius:10,color:"#E85050",padding:"7px 12px",fontSize:12,cursor:"pointer",fontFamily:"Outfit"}}>🗑️ Reset</button>
        </div>

        {topActs.length===0?<div style={{textAlign:"center",padding:36,background:"rgba(255,255,255,.03)",borderRadius:16}}>
          <div style={{fontSize:44,marginBottom:10}}>🗳️</div>
          <p style={{color:"rgba(240,234,214,.5)",lineHeight:1.6,fontSize:14}}>Aucun vote !<br/>Va dans <strong>Catalogue</strong>, choisis ton nom, et vote ❤️<br/>Les votes sont partagés entre tous ☁️</p>
        </div>:<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(105px,1fr))",gap:8,marginBottom:20}}>
            {PEOPLE.map(p=>{const c=A.filter(a=>votes[`${p.id}-${a.id}`]).length;return(
              <div key={p.id} style={{background:`${p.color}11`,border:`1px solid ${p.color}33`,borderRadius:14,padding:12,textAlign:"center"}}>
                <div style={{fontSize:24}}>{p.emoji}</div>
                <div style={{fontSize:12,fontWeight:600,color:p.color,marginTop:2}}>{p.name}</div>
                <div style={{fontSize:20,fontWeight:700,marginTop:2}}>{c}</div>
                <div style={{fontSize:10,color:"rgba(240,234,214,.4)"}}>activité{c!==1?"s":""}</div>
              </div>);})}
          </div>

          <h3 style={{fontSize:16,fontWeight:600,marginBottom:10}}>🏆 Classement consensus</h3>
          <div style={{display:"grid",gap:7,marginBottom:24}}>
            {topActs.map(({a,v},i)=>{const zo=ZONES.find(z=>z.id===a.zone);return(
              <div key={a.id} style={{background:v.length>=5?"rgba(242,197,124,.06)":"rgba(255,255,255,.04)",border:v.length>=5?"1px solid rgba(242,197,124,.2)":"1px solid rgba(255,255,255,.08)",borderRadius:13,padding:11}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}>
                  <div style={{width:30,height:30,borderRadius:8,background:v.length>=5?"linear-gradient(135deg,#F2C57C,#E88D67)":v.length>=3?"rgba(161,193,129,.2)":"rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0,color:v.length>=5?"#0A1628":"#F0EAD6"}}>{i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>{a.name} <span style={{fontSize:10,padding:"1px 5px",borderRadius:5,background:`${zo?.color}22`,color:zo?.color}}>{a.zone==="s1"?"S1":a.zone==="s2"?"S2":"Île"}</span></div>
                    <div style={{display:"flex",gap:2,marginTop:3}}>
                      {v.map(p=><span key={p.id} className="av" title={p.name} style={{background:`${p.color}33`,border:`2px solid ${p.color}`}}>{p.emoji}</span>)}
                      {PEOPLE.filter(p=>!v.find(x=>x.id===p.id)).map(p=><span key={p.id} className="av ghost" title={p.name}>{p.emoji}</span>)}
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:17,fontWeight:700,color:v.length>=5?"#F2C57C":v.length>=3?"#A1C181":"rgba(240,234,214,.5)"}}>{v.length}/6</div>
                    <div className="bar-track"><div className="bar-fill" style={{width:`${(v.length/6)*100}%`,background:v.length>=5?"linear-gradient(90deg,#F2C57C,#E88D67)":v.length>=3?"#A1C181":"rgba(255,255,255,.2)"}}/></div>
                  </div>
                </div>
              </div>);})}
          </div>

          <h3 style={{fontSize:16,fontWeight:600,marginBottom:10}}>🤝 Activités en commun</h3>
          <div style={{overflowX:"auto",marginBottom:16}}>
            <table style={{borderCollapse:"collapse",width:"100%"}}>
              <thead><tr><th style={{padding:5}}></th>{PEOPLE.map(p=><th key={p.id} style={{padding:5,fontSize:13}}>{p.emoji}</th>)}</tr></thead>
              <tbody>{PEOPLE.map(p1=><tr key={p1.id}>
                <td style={{padding:5,fontSize:11,color:p1.color,fontWeight:500,whiteSpace:"nowrap"}}>{p1.emoji} {p1.name}</td>
                {PEOPLE.map(p2=>{
                  if(p1.id===p2.id)return<td key={p2.id} style={{padding:5,textAlign:"center",color:"rgba(240,234,214,.2)",fontSize:11}}>—</td>;
                  const n=A.filter(a=>votes[`${p1.id}-${a.id}`]&&votes[`${p2.id}-${a.id}`]).length;
                  return<td key={p2.id} style={{padding:5,textAlign:"center"}}><span style={{fontSize:13,fontWeight:600,color:n>=5?"#F2C57C":n>=3?"#A1C181":"rgba(240,234,214,.3)"}}>{n}</span></td>;
                })}
              </tr>)}</tbody>
            </table>
          </div>
        </>}
      </div>}

      {/* ÎLES */}
      {tab==="iles"&&<div className="fu">
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,marginBottom:14}}>⛴️ Les îles</h2>
        {[
          {n:"Les Saintes",e:"⛵",f:"Trois-Rivières : 20 min. ~25€ A/R ad., ~15€ enf.",d:"Baie mythique, Fort Napoléon, Pain de Sucre, tourment d'amour.",t:"Réserver la veille. Premier ferry 8h. Golf-kart sur place.",w:"Tout le groupe ! Bébé écharpe, seniors OK."},
          {n:"Marie-Galante",e:"🍬",f:"Pointe-à-Pitre : 1h. ~25€ A/R.",d:"3 distilleries, plages désertes, moulins, Gueule Grand Gouffre.",t:"Voiture obligatoire sur place. Idéal 2 jours. Bébélé samedi !",w:"Groupe complet. Rythme lent, seniors OK."},
          {n:"Petite-Terre",e:"🦎",f:"Saint-François excursion ~80€/ad. 8h-16h.",d:"Réserve protégée. Iguanes, requins citron, snorkeling dingue.",t:"Réserver 2-3 sem. avant ! Traversée houleuse. Tout inclus.",w:"Split : pas bébé/seniors fragiles. Dès 5-6 ans."},
          {n:"La Désirade",e:"🏝️",f:"Saint-François : 45 min. ~20€ A/R.",d:"Île oubliée. Plages désertes, iguanes, bout du monde.",t:"Peu de restos — pique-nique. Véhicule sur place.",w:"Aventuriers nature sauvage."},
        ].map((ile,i)=><div key={i} style={{background:"rgba(157,78,221,.06)",border:"1px solid rgba(157,78,221,.15)",borderRadius:18,padding:16,marginBottom:12}}>
          <h3 style={{fontSize:19,fontWeight:700,marginBottom:5}}>{ile.e} {ile.n}</h3>
          <p style={{fontSize:13,color:"rgba(240,234,214,.65)",lineHeight:1.5,marginBottom:10}}>{ile.d}</p>
          {[{l:"⛴️ Ferry",c:"#9D4EDD",t:ile.f},{l:"💡 Tips",c:"#F2C57C",t:ile.t},{l:"👥 Qui ?",c:"#A1C181",t:ile.w}].map((s,j)=>
            <div key={j} style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:9,marginBottom:5}}>
              <div style={{fontSize:10,color:s.c,fontWeight:600,marginBottom:2}}>{s.l}</div>
              <div style={{fontSize:12,color:"rgba(240,234,214,.65)"}}>{s.t}</div>
            </div>)}
        </div>)}
      </div>}

      {/* INFOS */}
      {tab==="infos"&&<div className="fu">
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,marginBottom:14}}>ℹ️ Infos Pratiques</h2>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
          <div style={{background:"rgba(45,106,79,.1)",border:"1px solid rgba(45,106,79,.2)",borderRadius:14,padding:13}}>
            <div style={{fontSize:10,color:"#2D6A4F",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>Semaine 1</div>
            <div style={{fontSize:15,fontWeight:700,marginTop:3}}>🏡 Deshaies</div>
            <div style={{fontSize:11,color:"rgba(240,234,214,.5)",marginTop:2}}>Basse-Terre</div>
          </div>
          <div style={{background:"rgba(0,119,182,.1)",border:"1px solid rgba(0,119,182,.2)",borderRadius:14,padding:13}}>
            <div style={{fontSize:10,color:"#0077B6",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>Semaine 2</div>
            <div style={{fontSize:15,fontWeight:700,marginTop:3}}>🏡 Le Gosier</div>
            <div style={{fontSize:11,color:"rgba(240,234,214,.5)",marginTop:2}}>Grande-Terre</div>
          </div>
        </div>
        <div style={{display:"grid",gap:8}}>
          {INFO.map(s=><div key={s.id} className="ic" onClick={()=>setOpenInfo(openInfo===s.id?null:s.id)}
            style={openInfo===s.id?{background:"rgba(255,255,255,.07)",borderColor:"rgba(255,255,255,.15)"}:{}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h3 style={{fontSize:14,fontWeight:600}}>{s.t}</h3>
              <span style={{fontSize:15,transition:"transform .3s",transform:openInfo===s.id?"rotate(180deg)":""}}>▾</span>
            </div>
            {openInfo===s.id&&<p style={{marginTop:10,fontSize:13,color:"rgba(240,234,214,.65)",lineHeight:1.6}}>{s.c}</p>}
          </div>)}
        </div>
      </div>}

      </div>
      <div style={{textAlign:"center",padding:"34px 20px 22px",color:"rgba(240,234,214,.18)",fontSize:11}}>🌴 Gwada Guide — {A.length} activités — Partagé ☁️ 🌺</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
