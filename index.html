<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0A1628;color:#F0EAD6;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.fu{animation:fu .4s ease forwards}
.card{transition:all .25s;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;cursor:pointer}
.card.voted{background:rgba(232,80,80,.06);border-color:rgba(232,80,80,.22)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);user-select:none;white-space:nowrap}
.chip.on{background:rgba(45,106,79,.4);border-color:#2D6A4F;color:#A1C181}
.tab{padding:10px 16px;border-radius:12px;border:none;background:rgba(255,255,255,.06);color:#F0EAD6;cursor:pointer;font-size:13px;font-weight:500;font-family:'Outfit',sans-serif;transition:all .2s;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,#2D6A4F,#0077B6);color:#fff}
.pbtn{padding:7px 13px;border-radius:10px;border:2px solid transparent;background:rgba(255,255,255,.06);cursor:pointer;font-size:13px;font-family:'Outfit',sans-serif;color:#F0EAD6;transition:all .2s;display:flex;align-items:center;gap:5px}
.vb{border-radius:12px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;flex-shrink:0;transition:all .15s;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06)}
.vb.on{background:rgba(232,80,80,.2);border-color:#E85050}
.vb.pop{animation:pop .3s ease}
.ic{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;cursor:pointer;transition:all .3s}
input[type=text]{width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#F0EAD6;font-size:14px;font-family:'Outfit',sans-serif;outline:none}
input::placeholder{color:rgba(240,234,214,.3)}
.av{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.banner{padding:12px 16px;border-radius:12px;font-size:13px;margin-bottom:14px;line-height:1.5}
</style>

const lc=l=>l==="facile"?"#2D6A4F":l==="modéré"?"#E88D67":"#BB4430";

function App(){
  const[tab,setTab]=useState("catalogue");
  const[votes,setVotes]=useState({});
  const[connected,setConnected]=useState(null); // null=checking, true, false
  const[error,setError]=useState(null);
  const[filters,setFilters]=useState({themes:[],zone:"all",level:"all",search:""});
  const[me,setMe]=useState(null);
  const[exp,setExp]=useState(null);
  const[openInfo,setOpenInfo]=useState(null);
  const[popId,setPopId]=useState(null);

  // Check connection + load votes
  useEffect(()=>{
    fetch("/api/ping").then(r=>r.json()).then(d=>{
      if(d.ok){setConnected(true);return fetch("/api/votes").then(r=>r.json()).then(v=>setVotes(v));}
      else setConnected(false);
    }).catch(()=>setConnected(false));
  },[]);

  // Auto-refresh
  useEffect(()=>{
    if(!connected)return;
    const iv=setInterval(()=>{fetch("/api/votes").then(r=>r.json()).then(v=>setVotes(v)).catch(()=>{});},5000);
    return()=>clearInterval(iv);
  },[connected]);

  const toggle=async(pid,aid)=>{
    // Optimistic update
    const key=pid+"-"+aid;
    const next={...votes};
    if(next[key])delete next[key];else next[key]=true;
    setVotes(next);
    setPopId(aid);
    setTimeout(()=>setPopId(null),300);
    // Server sync
    try{
      const r=await fetch("/api/votes",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({personId:pid,activityId:aid})});
      if(!r.ok)throw new Error("HTTP "+r.status);
      const fresh=await r.json();
      setVotes(fresh);
      setError(null);
    }catch(e){
      setError("Erreur serveur ! Vérifie que le serveur tourne.");
    }
  };

  const refresh=async()=>{
    try{const r=await fetch("/api/votes");const v=await r.json();setVotes(v);setConnected(true);setError(null);}
    catch(e){setConnected(false);setError("Serveur injoignable");}
  };

  const resetAll=async()=>{
    if(!confirm("⚠️ Effacer TOUS les votes ?"))return;
    try{await fetch("/api/votes",{method:"DELETE"});setVotes({});}catch(e){setError("Erreur reset");}
  };

  const gv=aid=>PEOPLE.filter(p=>votes[p.id+"-"+aid]);
  const filtered=useMemo(()=>ACT.filter(a=>{
    if(filters.zone!=="all"&&a.zone!==filters.zone)return false;
    if(filters.level!=="all"&&a.level!==filters.level)return false;
    if(filters.themes.length&&!filters.themes.some(t=>a.themes.includes(t)))return false;
    if(filters.search){const s=filters.search.toLowerCase();if(!a.name.toLowerCase().includes(s)&&!a.desc.toLowerCase().includes(s))return false;}
    return true;
  }),[filters]);
  const top=useMemo(()=>{const r=[];ACT.forEach(a=>{const v=gv(a.id);if(v.length)r.push({a,v});});return r.sort((x,y)=>y.v.length-x.v.length);},[votes]);

  const INFO=[
    {id:"budget",t:"💰 Budget",c:"~100-150€/jour groupe (hors hébergement). Courses ~150-200€/sem. Essence ~1,60€/L. Restos 15-35€/plat. Ferry ~20-30€/adulte A/R."},
    {id:"meteo",t:"🌤️ Météo",c:"26-32°C stable. Carême (sec) déc-mai. Averses courtes l'après-midi. K-way + crème solaire 50."},
    {id:"secu",t:"🛡️ Sécurité",c:"Sûre. Rien en vue voitures. Manchinilliers (peinture rouge). Routes sinueuses Basse-Terre."},
    {id:"bebe",t:"👶 Bébé",c:"Porte-bébé indispensable. Couches/lait en supermarché. Moustiquaire, anti-moustiques. Eau bouteille."},
    {id:"senior",t:"👵 Seniors",c:"Chapeau, hydratation. Activités matin. Pharmacies Deshaies/Gosier. CHU à PàP."},
    {id:"ferry",t:"⛴️ Ferries",c:"L'Express des Îles, Val'Ferry, CTM Deher. Réserver en ligne. 30 min avant. Cocculine."},
    {id:"car",t:"🚗 2 Voitures",c:"Waze indispensable. Stations ferment tôt dimanche. Klaxonner virages (c'est local !)."},
    {id:"split",t:"👥 Split",c:"Équipe Aventure (Soufrière, plongée) + Équipe Relax (plage, jardin). Dîner ensemble !"},
    {id:"bag",t:"🧳 Valise",c:"Maillots x3, solaire 50, anti-moustiques, chaussures eau+rando, k-way, masque/tuba, sac étanche."},
  ];

  // Loading state
  if(connected===null)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48,animation:"fl 2s ease-in-out infinite"}}>🌴</div>
      <div style={{fontSize:15,opacity:.6}}>Connexion au serveur…</div>
    </div>
  );

  return(
    <div>
      {/* ERROR BANNER */}
      {connected===false&&<div className="banner" style={{background:"rgba(232,80,80,.15)",border:"1px solid rgba(232,80,80,.3)",margin:14,color:"#ff9999"}}>
        <strong>❌ Serveur non connecté</strong><br/>
        Le serveur Express ne répond pas. Vérifie dans Replit :<br/>
        • Que tu as bien les 3 fichiers à la racine (server.js, index.html, package.json)<br/>
        • Que la console affiche "🌴 GWADA GUIDE running"<br/>
        • Essaie de cliquer Stop puis Run dans Replit<br/>
        <button onClick={refresh} style={{marginTop:8,padding:"8px 16px",borderRadius:8,border:"none",background:"#E85050",color:"#fff",cursor:"pointer",fontFamily:"Outfit",fontWeight:600}}>🔄 Réessayer la connexion</button>
      </div>}
      {error&&connected&&<div className="banner" style={{background:"rgba(242,197,124,.12)",border:"1px solid rgba(242,197,124,.3)",margin:"0 14px 10px",color:"#F2C57C"}}>
        ⚠️ {error} <button onClick={()=>setError(null)} style={{marginLeft:8,background:"none",border:"none",color:"#F2C57C",cursor:"pointer",fontSize:16}}>✕</button>
      </div>}

      {/* HERO */}
      <div style={{position:"relative",padding:"44px 20px 20px",textAlign:"center",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(45,106,79,.15),rgba(0,119,182,.1) 50%,transparent)"}}/>
        <div style={{position:"absolute",top:18,left:"8%",fontSize:36,animation:"fl 4s ease-in-out infinite"}}>🌴</div>
        <div style={{position:"absolute",top:34,right:"10%",fontSize:28,animation:"fl 5s ease-in-out infinite 1s"}}>🐠</div>
        <div style={{position:"relative",zIndex:1}}>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(28px,7vw,48px)",fontWeight:700,background:"linear-gradient(135deg,#F0EAD6,#F2C57C,#E88D67)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Guadeloupe 🇬🇵</h1>
          <p style={{marginTop:5,fontSize:13,color:"rgba(240,234,214,.5)"}}>
            <span className="dot" style={{background:connected?"#2D6A4F":"#E85050",marginRight:5}}></span>
            {ACT.length} activités • Votes partagés en temps réel
          </p>
          <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:10,flexWrap:"wrap"}}>
            {PEOPLE.map(p=>{const c=ACT.filter(a=>votes[p.id+"-"+a.id]).length;return(
              <span key={p.id} style={{fontSize:11,background:`${p.color}22`,color:p.color,padding:"3px 8px",borderRadius:7,border:`1px solid ${p.color}44`}}>{p.emoji} {p.name}{c?` (${c})`:""}</span>
            );})}
          </div>
          <div style={{marginTop:8}}>
            <button onClick={refresh} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#F0EAD6",padding:"4px 12px",fontSize:11,cursor:"pointer",fontFamily:"Outfit"}}>🔄 Rafraîchir les votes</button>
          </div>
        </div>
      </div>

      {/* TABS */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(10,22,40,.96)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,.06)",padding:"9px 14px",display:"flex",gap:7,overflowX:"auto"}}>
        {[{id:"catalogue",l:"📋 Catalogue"},{id:"groupe",l:"👥 Groupe"},{id:"iles",l:"⛴️ Îles"},{id:"infos",l:"ℹ️ Infos"}].map(t=>
          <button key={t.id} className={`tab ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>
        )}
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:14}}>

      {tab==="catalogue"&&<div className="fu">
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,color:"rgba(240,234,214,.5)",marginBottom:7}}>👤 Qui es-tu ? <span style={{fontSize:11,color:"rgba(240,234,214,.3)"}}>(choisis ton nom pour voter)</span></div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",padding:7,background:"rgba(255,255,255,.04)",borderRadius:14}}>
            {PEOPLE.map(p=><button key={p.id} className="pbtn" onClick={()=>setMe(me===p.id?null:p.id)}
              style={me===p.id?{background:`${p.color}33`,borderColor:p.color,color:p.color}:{}}>{p.emoji} {p.name}</button>)}
          </div>
          {me?<div style={{marginTop:6,fontSize:13,color:PEOPLE.find(p=>p.id===me)?.color}}>✨ Touche ❤️ pour voter !</div>
            :<div style={{marginTop:6,fontSize:13,color:"rgba(240,234,214,.3)",fontStyle:"italic"}}>☝️ Sélectionne ton nom d'abord !</div>}
        </div>

        <input type="text" placeholder="🔍 Rechercher…" value={filters.search} onChange={e=>setFilters(f=>({...f,search:e.target.value}))} style={{marginBottom:10}}/>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          <span className={`chip ${filters.zone==="all"?"on":""}`} onClick={()=>setFilters(f=>({...f,zone:"all"}))}>🗺️ Toutes</span>
          {ZONES.map(z=><span key={z.id} className={`chip ${filters.zone===z.id?"on":""}`} onClick={()=>setFilters(f=>({...f,zone:z.id}))}
            style={filters.zone===z.id?{borderColor:z.color,color:z.color,background:`${z.color}22`}:{}}>{z.label}</span>)}
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          <span className={`chip ${filters.level==="all"?"on":""}`} onClick={()=>setFilters(f=>({...f,level:"all"}))}>Tous niveaux</span>
          {["facile","modéré","sportif"].map(l=><span key={l} className={`chip ${filters.level===l?"on":""}`} onClick={()=>setFilters(f=>({...f,level:l}))}
            style={filters.level===l?{borderColor:lc(l),color:lc(l),background:`${lc(l)}22`}:{}}>{l==="facile"?"🟢":l==="modéré"?"🟠":"🔴"} {l[0].toUpperCase()+l.slice(1)}</span>)}
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
          {THEMES.map(t=><span key={t.id} className={`chip ${filters.themes.includes(t.id)?"on":""}`}
            onClick={()=>setFilters(f=>({...f,themes:f.themes.includes(t.id)?f.themes.filter(x=>x!==t.id):[...f.themes,t.id]}))}>{t.icon} {t.label}</span>)}
        </div>
        <div style={{fontSize:12,color:"rgba(240,234,214,.3)",marginBottom:10}}>{filtered.length} activité{filtered.length!==1?"s":""}</div>

        {filtered.map(a=>{const v=gv(a.id);const isExp=exp===a.id;const zo=ZONES.find(z=>z.id===a.zone);const voted=me&&votes[me+"-"+a.id];
          return<div key={a.id} className={`card${voted?" voted":""}`} style={{marginBottom:10}} onClick={()=>setExp(isExp?null:a.id)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:4}}>
                  <h3 style={{fontSize:14,fontWeight:600}}>{a.name}</h3>
                  <span style={{fontSize:10,padding:"2px 6px",borderRadius:6,background:`${lc(a.level)}22`,color:lc(a.level)}}>{a.level}</span>
                  <span style={{fontSize:10,padding:"2px 6px",borderRadius:6,background:`${zo?.color}22`,color:zo?.color}}>{a.zone==="s1"?"S1":a.zone==="s2"?"S2":"Île"}</span>
                </div>
                <p style={{fontSize:12,color:"rgba(240,234,214,.55)",lineHeight:1.4}}>{a.desc}</p>
              </div>
              {me&&<button className={`vb${voted?" on":""}${popId===a.id?" pop":""}`} onClick={e=>{e.stopPropagation();toggle(me,a.id);}}>{voted?"❤️":"🤍"}</button>}
            </div>
            {v.length>0&&<div style={{marginTop:6,display:"flex",alignItems:"center",gap:3,flexWrap:"wrap"}}>
              {v.map(p=><span key={p.id} className="av" title={p.name} style={{background:`${p.color}33`,border:`2px solid ${p.color}`}}>{p.emoji}</span>)}
              {v.length>=4&&<span style={{fontSize:10,color:"#F2C57C",fontWeight:600}}>🔥</span>}
              {v.length===6&&<span style={{fontSize:10,color:"#E85050",fontWeight:600}}>⭐ UNANIME</span>}
            </div>}
            {isExp&&<div style={{marginTop:8,padding:10,background:"rgba(255,255,255,.03)",borderRadius:10,borderTop:"1px solid rgba(255,255,255,.06)"}} onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",gap:16,fontSize:12,marginBottom:4}}><span>⏱ {a.duration}</span><span>💰 {a.cost}</span></div>
              <div style={{fontSize:12,color:"rgba(240,234,214,.6)"}}><span style={{color:"#F2C57C"}}>Adapt. :</span> {a.adapt}</div>
            </div>}
          </div>;})}
      </div>}

      {tab==="groupe"&&<div className="fu">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24}}>👥 Vue Groupe</h2>
          <button onClick={resetAll} style={{background:"rgba(232,80,80,.1)",border:"1px solid rgba(232,80,80,.2)",borderRadius:10,color:"#E85050",padding:"6px 12px",fontSize:12,cursor:"pointer",fontFamily:"Outfit"}}>🗑️ Reset</button>
        </div>
        {top.length===0?<div style={{textAlign:"center",padding:36,background:"rgba(255,255,255,.03)",borderRadius:16}}>
          <div style={{fontSize:44,marginBottom:10}}>🗳️</div>
          <p style={{color:"rgba(240,234,214,.5)",lineHeight:1.6}}>Aucun vote !<br/>→ Catalogue → Choisis ton nom → Vote ❤️</p>
        </div>:<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8,marginBottom:20}}>
            {PEOPLE.map(p=>{const c=ACT.filter(a=>votes[p.id+"-"+a.id]).length;return(
              <div key={p.id} style={{background:`${p.color}11`,border:`1px solid ${p.color}33`,borderRadius:12,padding:10,textAlign:"center"}}>
                <div style={{fontSize:22}}>{p.emoji}</div>
                <div style={{fontSize:11,fontWeight:600,color:p.color}}>{p.name}</div>
                <div style={{fontSize:20,fontWeight:700}}>{c}</div>
              </div>);})}
          </div>
          <h3 style={{fontSize:15,fontWeight:600,marginBottom:10}}>🏆 Top activités</h3>
          {top.map(({a,v},i)=>{const zo=ZONES.find(z=>z.id===a.zone);return(
            <div key={a.id} style={{background:v.length>=5?"rgba(242,197,124,.06)":"rgba(255,255,255,.04)",border:v.length>=5?"1px solid rgba(242,197,124,.2)":"1px solid rgba(255,255,255,.08)",borderRadius:12,padding:10,marginBottom:7,display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:28,height:28,borderRadius:8,background:v.length>=5?"linear-gradient(135deg,#F2C57C,#E88D67)":"rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,flexShrink:0,color:v.length>=5?"#0A1628":"#F0EAD6"}}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{a.name}</div>
                <div style={{display:"flex",gap:2,marginTop:2}}>{v.map(p=><span key={p.id} className="av" style={{width:20,height:20,fontSize:10,background:`${p.color}33`,border:`1.5px solid ${p.color}`}}>{p.emoji}</span>)}</div>
              </div>
              <div style={{fontSize:16,fontWeight:700,color:v.length>=5?"#F2C57C":v.length>=3?"#A1C181":"rgba(240,234,214,.5)"}}>{v.length}/6</div>
            </div>);})}
        </>}
      </div>}

      {tab==="iles"&&<div className="fu">
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,marginBottom:14}}>⛴️ Les îles</h2>
        {[
          {n:"Les Saintes",e:"⛵",f:"Trois-Rivières : 20 min. ~25€ A/R.",d:"Baie mythique, Fort Napoléon, Pain de Sucre.",t:"Réserver veille. Golf-kart sur place.",w:"Tout le groupe !"},

          {n:"Petite-Terre",e:"🦎",f:"Saint-François ~80€/ad.",d:"Iguanes, requins citron, snorkeling dingue.",t:"Réserver 2-3 sem avant ! Houle possible.",w:"Split. Pas bébé. Dès 5-6 ans."},

        ].map((ile,i)=><div key={i} style={{background:"rgba(157,78,221,.06)",border:"1px solid rgba(157,78,221,.15)",borderRadius:16,padding:14,marginBottom:10}}>

          <p style={{fontSize:12,color:"rgba(240,234,214,.6)",marginBottom:8}}>{ile.d}</p>
          {[{l:"⛴️ Ferry",c:"#9D4EDD",t:ile.f},{l:"💡 Tips",c:"#F2C57C",t:ile.t},{l:"👥",c:"#A1C181",t:ile.w}].map((s,j)=>

      {tab==="infos"&&<div className="fu">
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,marginBottom:14}}>ℹ️ Infos Pratiques</h2>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          <div style={{background:"rgba(45,106,79,.1)",border:"1px solid rgba(45,106,79,.2)",borderRadius:12,padding:12}}>
            <div style={{fontSize:10,color:"#2D6A4F",fontWeight:600,textTransform:"uppercase"}}>Sem.1</div>
            <div style={{fontSize:15,fontWeight:700}}>🏡 Deshaies</div>
          </div>
          <div style={{background:"rgba(0,119,182,.1)",border:"1px solid rgba(0,119,182,.2)",borderRadius:12,padding:12}}>
            <div style={{fontSize:10,color:"#0077B6",fontWeight:600,textTransform:"uppercase"}}>Sem.2</div>
            <div style={{fontSize:15,fontWeight:700}}>🏡 Le Gosier</div>
          </div>
        </div>
        {INFO.map(s=><div key={s.id} className="ic" style={{marginBottom:8}} onClick={()=>setOpenInfo(openInfo===s.id?null:s.id)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <h3 style={{fontSize:14,fontWeight:600}}>{s.t}</h3>
            <span style={{transition:"transform .3s",transform:openInfo===s.id?"rotate(180deg)":""}}>▾</span>
          </div>
          {openInfo===s.id&&<p style={{marginTop:8,fontSize:13,color:"rgba(240,234,214,.65)",lineHeight:1.6}}>{s.c}</p>}
        </div>)}
      </div>}

      </div>
      <div style={{textAlign:"center",padding:"30px 20px",color:"rgba(240,234,214,.15)",fontSize:11}}>🌴 Gwada Guide Partagé 🌺</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
